<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKO JIPUNG</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
}

.hero{
height:100vh;
background:url("beauty.jpeg") center center/cover no-repeat;
position:relative;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
}

.hero-content{
position:relative;
z-index:10;
max-width:700px;
padding:20px;
}

.hero h1{
color:white;
font-size:70px;
margin-bottom:20px;
}

.hero p{
color:white;
font-size:22px;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:15px 30px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

.payment-container{
position:absolute;
top:35%;
left:0;
width:100%;
overflow:hidden;
z-index:5;
}

.payment-track{
display:flex;
align-items:center;
gap:80px;
width:max-content;
animation:marquee 15s linear infinite;
}

.payment-track img{
width:80px;
height:auto;
}

@keyframes marquee{

0%{
transform:translateX(-500px);
}

100%{
transform:translateX(calc(100vw + 500px));
}

}

</style>
</head>
<body>

<section class="hero">

<div class="payment-container">

<div class="payment-track">

<img src="Paypal.png" alt="PayPal">
<img src="Dana.png" alt="Dana">
<img src="Seabank.png" alt="SeaBank">

<img src="Paypal.png" alt="PayPal">
<img src="Dana.png" alt="Dana">
<img src="Seabank.png" alt="SeaBank">

<img src="Paypal.png" alt="PayPal">
<img src="Dana.png" alt="Dana">
<img src="Seabank.png" alt="SeaBank">

</div>

</div>

<div class="hero-content">

<h1>TOKO JIPUNG</h1>

<p>
Jasa Kreatif Digital & Pendampingan Personal
</p>

<a href="https://wa.me/6285134662506" class="btn">
Hubungi WhatsApp
</a>

</div>

</section>

</body>
</html>
